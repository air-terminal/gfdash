services:
  db:
    image: postgres:18
    restart: always
    command: -c 'config_file=/etc/postgresql/postgresql.conf' # 追加
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./containers/postgres/sql:/docker-entrypoint-initdb.d
      - ./containers/postgres/config/postgresql.conf:/etc/postgresql/postgresql.conf # 追加
    env_file:
      - .env
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5    
  web:
    build: .
    restart: always
    entrypoint: /code/entrypoint.sh
    command: python3 gfdash/manage.py runserver 0.0.0.0:8080
    volumes:
      - .:/code
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy # DBが完全に起動してから開始するように設定
    env_file:
      - .env
      
volumes:
    postgres-data:
      driver: local

