{% extends "app/base_site.html" %}

{% block stylesheets %}
  {{ block.super }}
  <!-- bootstrap-datepicker -->
  <link href="/static/gf_vendors/bootstrap-datepicker/dist/css/bootstrap-datepicker.min.css" rel="stylesheet"  type="text/css">
  <link href="/static/gf_vendors/datatables.net-bs/datatables.min.css" rel="stylesheet"  type="text/css">

  <link href="/static/build/css/custom_gf.css" rel="stylesheet"  type="text/css">
{% endblock stylesheets %}

{% block content %}
  <div class="right_col" role="main">
    <input type="hidden" id="calendar_saveval" value="">
    <input type="hidden" id="calendar_initval" value="">
    <input type="hidden" id="calendar_from" value="">
    <input type="hidden" id="calendar_to" value="">

    <div class="">
      <div class="row">
        <div class="col-md-12 col-sm-12 col-xs-12">
          <div class="x_panel">
            <div class="row x_title">
              <div class="col-md-5 col-sm-4">
                <h2 id="gf_header"><small></small></h2>
              </div>

              <div class="col-md-4 col-sm-4">
                <div id="toggleBtn" class="btn-group pull-right" data-toggle="buttons">
                  <label class="btn btn-default" data-toggle-class="btn-primary" data-toggle-passive-class="btn-default">
                    <input type="radio" name="chart_mode" value="nenkan" onchange="btnToggleTableOption()" checked>年間
                  </label>
                  <label class="btn btn-primary" data-toggle-class="btn-primary" data-toggle-passive-class="btn-default">
                    <input type="radio" name="chart_mode" value="kamiki" onchange="btnToggleTableOption()">上期
                  </label>
                  <label class="btn btn-primary" data-toggle-class="btn-primary" data-toggle-passive-class="btn-default">
                    <input type="radio" name="chart_mode" value="simoki" onchange="btnToggleTableOption()">下期
                  </label>
                </div>
              </div>

              <div class="col-md-3 col-sm-4">
                <div class="gf_custom_menu_parts pull-right">
                  <button id="tbn_prev_month" type="button" class="btn btn-default glyphicon glyphicon-chevron-left" onclick="sub115_btnPrevMonth()"></button>
                  <div class="input-group date" style="margin-bottom: 0px;">
                    <span class="input-group-addon"><i class="glyphicon glyphicon-calendar fa-solid fa-calendar-days"></i></span>
                    <input id="gf_calendar"  type="text" class="form-control" style="width:7em;">
                  </div>
                  <button id="tbn_next_month" type="button" class="btn btn-default glyphicon glyphicon-chevron-right" onclick="sub115_btnNextMonth()"></button>
                </div>
              </div>
            </div>
            <br>
            <div class="x_content gf_custom">
              
              <canvas id="chart_plot_mix" ></canvas>
  
            </div>
          </div>
        </div>
      </div>


      <div class="row">
        <div class="col-md-12 col-sm-12 col-xs-12">
          <div class="x_panel">
            <div class="x_content gf_custom">
              <table id="datatable_gf" class="table table-striped table-bordered">
                <thead>
                  <tr>
                    <th rowspan="2">月</th>
                    <th rowspan="2">朝</th>
                    <th rowspan="2">昼</th>
                    <th rowspan="2">夜</th>
                    <th rowspan="2">スクール</th>
                    <th rowspan="2" id="school1-1">(内部S)</th>
                    <th rowspan="2">メンバー</th>
                    <th rowspan="2">ビジター</th>
                    <th colspan="3" class="category-head">月間計</th>
                    <th colspan="3" class="category-head">年間計</th>
                  </tr>
                  <tr class="category">
                    <th>合計</th>
                    <th>前年計</th>
                    <th>前年比</th>
                    <th>合計</th>
                    <th>前年計</th>
                    <th>前年比</th>
                  </tr>
                </thead>
                <tfoot class="table-group-divider">
                  <tr>
                    <td class="table-foothead">合計</td>
                    <td id="morningAll"></td><td id="noonAll"></td><td id="nightAll"></td>
                    <td id="schoolAll"></td><td id="internalSchoolAll"></td>
                    <td id="memberAll"></td><td id="visitorAll"></td>
                    <td id="allAll"></td>
                    <td id="xxxx"></td>
                    <td id="xxxxx"></td>
                    <td id="x"></td>
                    <td id="xx"></td>
                    <td id="xxx"></td>
                  </tr>
                  <tr>
                    <td class="table-foothead">前年計</td>
                    <td id="oldMorning"></td><td id="oldNoon"></td><td id="oldNight"></td>
                    <td id="oldSchool"></td><td id="oldInternalSchool"></td>
                    <td id="oldMember"></td><td id="oldVisitor"></td>
                    <td></td><td></td><td></td><td></td><td></td><td></td>
                  </tr>
                  <tr>
                    <td class="table-foothead">前年比</td>
                    <td id="compMorning"></td><td id="compNoon"></td><td id="compNight"></td>
                    <td id="compSchool"></td><td id="compInternalSchool"></td>
                    <td id="compMember"></td><td id="compVisitor"></td>
                    <td></td><td></td><td></td><td></td><td></td><td></td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock content %}

{% block javascripts %}
  {{ block.super }}
  <!-- Chart.js -->
  <script src="/static/gf_vendors/chart.js-4.4.8/package/dist/chart.umd.js"></script>

  <!-- Datatables -->
  <script src="/static/gf_vendors/datatables.net-bs/datatables.min.js"></script>
  <script src="/static/vendors/jszip/dist/jszip.min.js"></script>
  <script src="/static/vendors/pdfmake/build/pdfmake.min.js"></script>
  <script src="/static/vendors/pdfmake/build/vfs_fonts.js"></script>

  <!-- bootstrap-datepicker GF カスタム -->
  <script src="/static/gf_vendors/bootstrap-datepicker/dist/js/bootstrap-datepicker.min.js"></script>
  <script src="/static/gf_vendors/bootstrap-datepicker/dist/locales/bootstrap-datepicker.ja.min.js"></script>

  <!-- 115nenkan_raijyo_data専用javascriptの宣言 -->
  <script src="/static/build/js/customjs_115.js"></script>

{% endblock javascripts %}
